{% comment %} <h2>Register</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username"><br><br>
    <input type="email" name="email" placeholder="Email"><br><br>
    <input type="password" name="password" placeholder="Password"><br><br>
    <button type="submit">Register</button>
</form> {% endcomment %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - CampusKart</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f1f3f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .form-signup {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-weight: 600;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn-success {
            border-radius: 8px;
            font-weight: 500;
        }

        .form-text-link a {
            text-decoration: none;
            font-weight: 500;
        }

        .form-text-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<main class="form-signup">
    <form method="POST">
        {% csrf_token %}

        <h1 class="h4 mb-3 text-center">Create Account</h1>

        <!-- 🔴 Error -->
        {% if error %}
        <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        <!-- Username -->
        <div class="form-floating mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
            <label>Username</label>
        </div>

        <!-- Email -->
        <div class="form-floating mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
            <label>Email</label>
        </div>

        <!-- Password -->
        <div class="form-floating mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
            <label>Password</label>
        </div>

        <button class="btn btn-success w-100 py-2">Register</button>

        <p class="mt-3 text-center form-text-link">
            Already have an account? 
            <a href="{% url 'login' %}">Login</a>
        </p>
    </form>
</main>

</body>
</html>
